// Fichier Gradle au niveau racine (projet) - build.gradle
buildscript {
    repositories {
        google() // Ajouté ici pour que le plugin Google Services soit téléchargé
        mavenCentral()
    }
    dependencies {
        // Ajouter la dépendance pour le plugin Google Services
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
